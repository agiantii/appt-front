
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slidev Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "var(--border)",
              background: "var(--background)",
              foreground: "var(--foreground)",
              primary: {
                DEFAULT: "var(--primary)",
                foreground: "var(--primary-foreground)",
              },
              secondary: {
                DEFAULT: "var(--secondary)",
                foreground: "var(--secondary-foreground)",
              },
              muted: {
                DEFAULT: "var(--muted)",
                foreground: "var(--muted-foreground)",
              },
              accent: {
                DEFAULT: "var(--accent)",
                foreground: "var(--accent-foreground)",
              },
              destructive: {
                DEFAULT: "var(--destructive)",
                foreground: "var(--destructive-foreground)",
              },
              ring: "var(--ring)",
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      /* CSS Variables for Light Mode (default) */
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96.1%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96.1%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96.1%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 222.2 84% 4.9%;
      }

      /* CSS Variables for Dark Mode (更深的Claude风格) */
      .dark {
        --background: 240 10% 2%;
        --foreground: 0 0% 98%;
        --card: 240 10% 2%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 2%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 5% 8%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 5% 8%;
        --muted-foreground: 240 5% 55%;
        --accent: 240 5% 8%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 100%;
        --border: 240 5% 12%;
        --input: 240 5% 10%;
        --ring: 240 4.9% 83.9%;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--muted-foreground);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--foreground);
      }
      /* CodeMirror Overrides */
      .cm-editor {
        height: 100%;
        background: transparent !important;
      }
      .cm-scroller {
        font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', 'Monaco', 'Courier New', monospace !important;
      }
      /* Yjs Awareness Cursors */
      .cm-ySelection {
        opacity: 0.3;
      }
      .cm-ySelectionCaret {
        position: relative;
        border-left: 2px solid black;
        margin-left: -1px;
        margin-right: -1px;
        z-index: 10;
        pointer-events: none;
      }
      .cm-ySelectionInfo {
        position: absolute;
        top: -1.2em;
        left: -1px;
        font-size: 10px;
        font-family: sans-serif;
        font-weight: bold;
        padding: 1px 4px;
        border-radius: 2px;
        color: white;
        white-space: nowrap;
        user-select: none;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .cm-ySelectionCaret:hover .cm-ySelectionInfo {
        opacity: 1;
      }
    </style>
<script type="importmap">
{
  "imports": {

    "@codemirror/language": "https://esm.sh/@codemirror/language@^6.0.0",
    "@codemirror/commands": "https://esm.sh/@codemirror/commands@^6.0.0",
    "@codemirror/search": "https://esm.sh/@codemirror/search@^6.0.0",
    "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@^6.0.0",
    "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html@^6.0.0",
    "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@^6.0.0",
    "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@^6.0.0",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@^6.0.0",
    "@lezer/highlight": "https://esm.sh/@lezer/highlight@^1.0.0",
    "@codemirror/language-data": "https://esm.sh/@codemirror/language-data@^6.5.2",
    "yjs": "https://esm.sh/yjs@13.6.20",
    "@hocuspocus/provider": "https://esm.sh/@hocuspocus/provider@^3.4.4?external=yjs",

  }
}
</script>

</head>
